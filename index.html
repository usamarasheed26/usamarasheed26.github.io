document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

urce Sans 3',sans-serif;font-size:14px;font-weight:600;color:#0d1f3c;margin-bottom:4px;\">You decide — zero pressure<\u002Fdiv>\n            <div style=\"font-family:'Source Sans 3',sans-serif;font-size:13px;color:#8a9ab5;line-height:1.65;\">If it fits, we talk next steps. If not, no follow-up unless you ask.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Right: Form card -->\n    <div style=\"background:white;border:1px solid #e0d8cc;\">\n\n      <!-- Audience toggle -->\n      <div style=\"display:flex;border-bottom:2px solid #e0d8cc;\">\n        <button style=\"{{ uniTabStyle }}\" onclick=\"{{ setUniversity }}\">University / Faculty<\u002Fbutton>\n        <button style=\"{{ corpTabStyle }}\" onclick=\"{{ setCorporate }}\">Corporate L&amp;D<\u002Fbutton>\n      <\u002Fdiv>\n\n      <!-- Success state -->\n      <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:64px 48px;text-align:center;\">\n          <div style=\"width:60px;height:60px;background:#c47b1a;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 28px;\">\n            <span style=\"color:white;font-size:24px;font-weight:700;\">✓<\u002Fspan>\n          <\u002Fdiv>\n          <h3 style=\"font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:#0d1f3c;line-height:1.2;margin-bottom:14px;\">We'll be in touch within 48 hours.<\u002Fh3>\n          <p style=\"font-family:'Source Sans 3',sans-serif;font-size:14px;line-height:1.7;color:#5a6070;\">Someone from the Stratagem team will reach out to schedule your demo and discuss your program.<\u002Fp>\n          <div style=\"margin-top:36px;padding-top:28px;border-top:1px solid #e8e2d8;\">\n            <a href=\"#simulations\" style=\"font-family:'Source Sans 3',sans-serif;font-size:13px;color:#c47b1a;font-weight:600;\">Explore the simulations while you wait →<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- Form -->\n      <sc-if value=\"{{ showForm }}\" hint-placeholder-val=\"{{ true }}\">\n        <form onsubmit=\"{{ handleSubmit }}\" style=\"padding:36px 40px;display:flex;flex-direction:column;gap:20px;\">\n\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;\">\n            <div style=\"display:flex;flex-direction:column;gap:7px;\">\n              <label style=\"font-family:'Source Sans 3',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#9a8a6a;\">Name *<\u002Flabel>\n              <input required=\"\" name=\"name\" type=\"text\" placeholder=\"Your full name\" style=\"padding:11px 14px;border:1px solid #e0d8cc;font-family:'Source Sans 3',sans-serif;font-size:14px;color:#0d1f3c;outline:none;width:100%;\">\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:7px;\">\n              <label style=\"font-family:'Source Sans 3',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#9a8a6a;\">Email *<\u002Flabel>\n              <input required=\"\" name=\"email\" type=\"email\" placeholder=\"your@institution.edu\" style=\"padding:11px 14px;border:1px solid #e0d8cc;font-family:'Source Sans 3',sans-serif;font-size:14px;color:#0d1f3c;outline:none;width:100%;\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;flex-direction:column;gap:7px;\">\n            <label style=\"font-family:'Source Sans 3',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#9a8a6a;\">{{ institutionLabel }} *<\u002Flabel>\n            <input required=\"\" name=\"institution\" type=\"text\" placeholder=\"{{ institutionPlaceholder }}\" style=\"padding:11px 14px;border:1px solid #e0d8cc;font-family:'Source Sans 3',sans-serif;font-size:14px;color:#0d1f3c;outline:none;width:100%;\">\n          <\u002Fdiv>\n\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;\">\n            <div style=\"display:flex;flex-direction:column;gap:7px;\">\n              <label style=\"font-family:'Source Sans 3',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#9a8a6a;\">Your Role *<\u002Flabel>\n              <input required=\"\" name=\"role\" type=\"text\" placeholder=\"{{ rolePlaceholder }}\" style=\"padding:11px 14px;border:1px solid #e0d8cc;font-family:'Source Sans 3',sans-serif;font-size:14px;color:#0d1f3c;outline:none;width:100%;\">\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:7px;\">\n              <label style=\"font-family:'Source Sans 3',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#9a8a6a;\">Cohort Size<\u002Flabel>\n              <select name=\"cohortSize\" style=\"padding:11px 14px;border:1px solid #e0d8cc;font-family:'Source Sans 3',sans-serif;font-size:14px;color:#0d1f3c;outline:none;width:100%;background:white;\">\n                <option value=\"\">Select range<\u002Foption>\n                <option value=\"under20\">Under 20<\u002Foption>\n                <option value=\"20-50\">20 – 50<\u002Foption>\n                <option value=\"50-100\">50 – 100<\u002Foption>\n                <option value=\"100+\">100+<\u002Foption>\n              <\u002Fselect>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;flex-direction:column;gap:7px;\">\n            <label style=\"font-family:'Source Sans 3',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#9a8a6a;\">Which simulation interests you most?<\u002Flabel>\n            <select name=\"simulation\" style=\"padding:11px 14px;border:1px solid #e0d8cc;font-family:'Source Sans 3',sans-serif;font-size:14px;color:#0d1f3c;outline:none;width:100%;background:white;\">\n              <option value=\"\">Select a simulation<\u002Foption>\n              <option value=\"autorevive\">AutoRevive Dynamics — CFO Role<\u002Foption>\n              <option value=\"leadership\">Leadership Sim — Manager Role<\u002Foption>\n              <option value=\"macrolab\">MacroLab — Policy Maker Role<\u002Foption>\n              <option value=\"aienter\">AI Enterprise Transformation — CATO Role<\u002Foption>\n              <option value=\"unsure\">Not sure yet<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;flex-direction:column;gap:7px;\">\n            <label style=\"font-family:'Source Sans 3',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#9a8a6a;\">Anything else? <span style=\"opacity:0.5;font-weight:400;text-transform:none;letter-spacing:0;\">(optional)<\u002Fspan><\u002Flabel>\n            <textarea name=\"message\" rows=\"3\" placeholder=\"Your timeline, program context, or questions...\" style=\"padding:11px 14px;border:1px solid #e0d8cc;font-family:'Source Sans 3',sans-serif;font-size:14px;color:#0d1f3c;outline:none;width:100%;resize:vertical;line-height:1.6;\"><\u002Ftextarea>\n          <\u002Fdiv>\n\n          <button type=\"submit\" style=\"{{ submitStyle }}\">{{ submitLabel }}<\u002Fbutton>\n\n          <sc-if value=\"{{ showError }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:#fdf0f0;border:1px solid #f0c8c8;padding:12px 16px;display:flex;align-items:center;gap:10px;\">\n              <span style=\"color:#c0392b;font-size:14px;\">⚠<\u002Fspan>\n              <p style=\"font-family:'Source Sans 3',sans-serif;font-size:13px;color:#c0392b;line-height:1.5;\">Something went wrong. Please try again or email us directly at <strong>usama.rasheed@smartagentx.ai<\u002Fstrong><\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <p style=\"font-family:'Source Sans 3',sans-serif;font-size:11px;color:#b0a898;text-align:center;line-height:1.6;\">No commitment. We respond within 48 hours. Your information is never shared.<\u002Fp>\n\n        <\u002Fform>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── FOOTER ────────────────────────────────────────────── -->\n<footer style=\"background:#060e1e;padding:64px 64px 40px;\">\n  <div style=\"max-width:1280px;margin:0 auto;\">\n    <div style=\"display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:64px;padding-bottom:56px;border-bottom:1px solid rgba(255,255,255,0.07);\">\n      <div>\n        <div style=\"font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#f3ede3;margin-bottom:8px;\">Stratagem<\u002Fdiv>\n        <div style=\"font-family:'Source Sans 3',sans-serif;font-size:13px;color:rgba(243,237,227,0.45);font-style:italic;margin-bottom:20px;\">Judgment is built, not taught.<\u002Fdiv>\n        <p style=\"font-family:'Source Sans 3',sans-serif;font-size:13px;line-height:1.65;color:rgba(243,237,227,0.4);max-width:280px;\">AI-powered business simulations for MBA programs and executive leadership development. Four simulations. Four C-suite roles. Real AI. Real stakes.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Source Sans 3',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:rgba(243,237,227,0.35);margin-bottom:20px;\">Simulations<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:12px;\">\n          <a href=\"#\" style=\"font-family:'Source Sans 3',sans-serif;font-size:13px;color:rgba(243,237,227,0.55);\">AutoRevive Dynamics<\u002Fa>\n          <a href=\"#\" style=\"font-family:'Source Sans 3',sans-serif;font-size:13px;color:rgba(243,237,227,0.55);\">Leadership Sim<\u002Fa>\n          <a href=\"#\" style=\"font-family:'Source Sans 3',sans-serif;font-size:13px;color:rgba(243,237,227,0.55);\">MacroLab<\u002Fa>\n          <a href=\"#\" style=\"font-family:'Source Sans 3',sans-serif;font-size:13px;color:rgba(243,237,227,0.55);\">AI Enterprise Transformation<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Source Sans 3',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:rgba(243,237,227,0.35);margin-bottom:20px;\">Platform<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:12px;\">\n          <a href=\"#\" style=\"font-family:'Source Sans 3',sans-serif;font-size:13px;color:rgba(243,237,227,0.55);\">For Universities<\u002Fa>\n          <a href=\"#\" style=\"font-family:'Source Sans 3',sans-serif;font-size:13px;color:rgba(243,237,227,0.55);\">For Corporates<\u002Fa>\n          <a href=\"#\" style=\"font-family:'Source Sans 3',sans-serif;font-size:13px;color:rgba(243,237,227,0.55);\">How It Works<\u002Fa>\n          <a href=\"#\" style=\"font-family:'Source Sans 3',sans-serif;font-size:13px;color:rgba(243,237,227,0.55);\">Pricing<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Source Sans 3',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:rgba(243,237,227,0.35);margin-bottom:20px;\">Company<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:12px;\">\n          <a href=\"#\" style=\"font-family:'Source Sans 3',sans-serif;font-size:13px;color:rgba(243,237,227,0.55);\">About<\u002Fa>\n          <a href=\"#\" style=\"font-family:'Source Sans 3',sans-serif;font-size:13px;color:rgba(243,237,227,0.55);\">Contact<\u002Fa>\n          <a href=\"#\" style=\"font-family:'Source Sans 3',sans-serif;font-size:13px;color:rgba(243,237,227,0.55);\">Book a Demo<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;justify-content:space-between;padding-top:28px;\">\n      <div style=\"font-family:'Source Sans 3',sans-serif;font-size:12px;color:rgba(243,237,227,0.25);\">© 2025 Stratagem. All rights reserved.<\u002Fdiv>\n      <div style=\"font-family:'Source Sans 3',sans-serif;font-size:12px;color:rgba(243,237,227,0.25);\">Powered by Claude AI<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n<\u002Fx-dc>\n\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    audience: 'university',\n    pricingAudience: 'university',\n    submitted: false,\n    submitting: false,\n    error: false\n  };\n\n  renderVals() {\n    const { audience, submitted, submitting } = this.state;\n    const isUni = audience === 'university';\n\n    const tabBase = 'flex:1;padding:14px 20px;border:none;cursor:pointer;font-family:Source Sans 3,sans-serif;font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;';\n    const activeTab = tabBase + 'background:#0d1f3c;color:#f3ede3;';\n    const inactiveTab = tabBase + 'background:#f7f4f0;color:#9a8a6a;';\n\n    return {\n      submitted,\n      showForm: !submitted,\n\n      uniTabStyle: isUni ? activeTab : inactiveTab,\n      corpTabStyle: !isUni ? activeTab : inactiveTab,\n\n      setUniversity: () => this.setState({ audience: 'university' }),\n      setCorporate: () => this.setState({ audience: 'corporate' }),\n\n      institutionLabel: isUni ? 'Institution / University' : 'Company',\n      institutionPlaceholder: isUni ? 'e.g. IBA, Harvard Business School, INSEAD' : 'e.g. McKinsey, Unilever, Engro',\n      rolePlaceholder: isUni ? 'e.g. Associate Dean, Professor' : 'e.g. Head of L&D, CHRO',\n\n      showPricingUni: this.state.pricingAudience === 'university',\n      showPricingCorp: this.state.pricingAudience === 'corporate',\n      setPricingUniversity: () => this.setState({ pricingAudience: 'university' }),\n      setPricingCorporate: () => this.setState({ pricingAudience: 'corporate' }),\n      pricingUniTabStyle: this.state.pricingAudience === 'university'\n        ? 'padding:12px 36px;border:none;cursor:pointer;font-family:Source Sans 3,sans-serif;font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;background:#0d1f3c;color:#f3ede3;'\n        : 'padding:12px 36px;border:none;cursor:pointer;font-family:Source Sans 3,sans-serif;font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;background:#f0ebe2;color:#9a8a6a;',\n      pricingCorpTabStyle: this.state.pricingAudience === 'corporate'\n        ? 'padding:12px 36px;border:none;cursor:pointer;font-family:Source Sans 3,sans-serif;font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;background:#0d1f3c;color:#f3ede3;'\n        : 'padding:12px 36px;border:none;cursor:pointer;font-family:Source Sans 3,sans-serif;font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;background:#f0ebe2;color:#9a8a6a;',\n      showError: this.state.error,\n      submitLabel: submitting ? 'Sending...' : 'Request Demo →',\n      submitStyle: 'width:100%;padding:15px;background:' + (submitting ? '#9a8a6a' : '#c47b1a') + ';color:white;border:none;cursor:' + (submitting ? 'not-allowed' : 'pointer') + ';font-family:Source Sans 3,sans-serif;font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;',\n\n      handleSubmit: (e) => {\n        e.preventDefault();\n        if (this.state.submitting) return;\n        this.setState({ submitting: true, error: false });\n\n        const form = e.target;\n        const data = new FormData(form);\n        // Tag which audience tab was active\n        data.append('_audience', this.state.audience === 'university' ? 'University / Faculty' : 'Corporate L&D');\n        data.append('_subject', 'New Demo Request — Stratagem');\n\n        fetch('https://formspree.io/usama.rasheed@smartagentx.ai', {\n          method: 'POST',\n          body: data,\n          headers: { 'Accept': 'application/json' }\n        })\n        .then(res => {\n          if (res.ok) {\n            this.setState({ submitted: true, submitting: false });\n          } else {\n            this.setState({ submitting: false, error: true });\n          }\n        })\n        .catch(() => {\n          this.setState({ submitting: false, error: true });\n        });\n      }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
